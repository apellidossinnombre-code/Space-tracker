<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Launch Detail</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app"></div>

<script type="module">
import { getLaunchById } from "./js/api.js";

const id = new URLSearchParams(location.search).get("id");
const app = document.getElementById("app");

const l = await getLaunchById(id);

app.innerHTML = `
  <div class="card">
    <img src="${l.image || ''}" />
    <div class="card-content">

      <h2>${l.name}</h2>

      <p>🚀 ${l.rocket?.configuration?.name}</p>
      <p>📍 ${l.pad?.name}</p>
      <p>📅 ${new Date(l.net).toLocaleString()}</p>

      <p>${l.mission?.description || "No description"}</p>

    </div>
  </div>
`;
</script>

</body>
</html>
